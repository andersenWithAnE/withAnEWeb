name: Deploy to Firebase

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: github-deploy@withanesite.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --project withanesite